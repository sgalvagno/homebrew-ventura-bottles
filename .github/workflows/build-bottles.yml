name: Build Bottles for Ventura

on:
  push:
    paths:
      - 'packages.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, macOS, X64, ventura]
    steps:
      - uses: actions/checkout@v4

      - name: Restore homebrew-core cache
        uses: actions/cache@v4
        id: cache-homebrew-core
        with:
          path: /tmp/homebrew-core
          key: homebrew-core-${{ runner.os }}-${{ hashFiles('packages.txt') }}
          restore-keys: |
            homebrew-core-${{ runner.os }}-

      - name: Clone homebrew-core (fork)
        if: steps.cache-homebrew-core.outputs.cache-hit != 'true'
        run: |
          rm -rf /tmp/homebrew-core
          git clone --filter=blob:none --no-checkout \
            https://github.com/sgalvagno/homebrew-core.git /tmp/homebrew-core

      - name: Update homebrew-core
        if: steps.cache-homebrew-core.outputs.cache-hit == 'true'
        run: |
          cd /tmp/homebrew-core
          git fetch origin

      - name: Extraire les formules avec bottle ventura
        run: |
          cd /tmp/homebrew-core
          while IFS= read -r pkg || [[ -n "$pkg" ]]; do
            [[ "$pkg" =~ ^#.*$ || -z "$pkg" ]] && continue
            letter="${pkg:0:1}"

            # Trouve le dernier commit avec ventura pour ce package
            hash=$(git --no-pager log --oneline -S 'ventura:' \
              -- "Formula/${letter}/${pkg}.rb" | head -1 | awk '{print $1}')

            if [[ -z "$hash" ]]; then
              echo "SKIP: $pkg — pas de bottle ventura trouvée"
              continue
            fi

            # Extrait la formule depuis le commit parent
            git show "${hash}~1:Formula/${letter}/${pkg}.rb" > "/tmp/${pkg}.rb"

            # Ne garde que la ligne ventura: dans le bloc bottle do
            python3 "$GITHUB_WORKSPACE/.github/scripts/filter_bottle.py" "$pkg"
            cp "/tmp/${pkg}.rb" "$GITHUB_WORKSPACE/Formula/${pkg}.rb"
          done < "$GITHUB_WORKSPACE/packages.txt"

      - name: Compiler les bottles
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          while IFS= read -r pkg || [[ -n "$pkg" ]]; do
            [[ "$pkg" =~ ^#.*$ || -z "$pkg" ]] && continue
            brew install --build-bottle "./Formula/${pkg}.rb" && \
            brew bottle "$pkg" \
              --root-url "https://github.com/sgalvagno/homebrew-ventura-bottles/releases/download/bottles-${{ github.run_number }}" \
              --json || echo "FAILED: $pkg"
          done < packages.txt

      - name: Publier en Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bottles-${{ github.run_number }}
          files: |
            *.bottle.tar.gz
            *.json


